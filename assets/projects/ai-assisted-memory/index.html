<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assisted Memory Enhancement</title>
    <style>
      :root { color-scheme: dark; --bg: #070708; --text: #f5f2e9; --muted: rgba(245,242,233,.66); --line: rgba(245,242,233,.16); --accent: #dfff67; }
      * { box-sizing: border-box; }
      body { margin: 0; background: radial-gradient(circle at 20% 0%, rgba(223,255,103,.15), transparent 28rem), #070708; color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(1440px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 64px; }
      header { display: flex; justify-content: space-between; gap: 20px; align-items: end; border-bottom: 1px solid var(--line); padding-bottom: 22px; }
      h1 { max-width: 960px; margin: 0; font-size: clamp(38px, 7vw, 96px); line-height: .95; letter-spacing: 0; }
      p { max-width: 720px; margin: 14px 0 0; color: var(--muted); line-height: 1.8; }
      a { color: inherit; }
      .back { display: inline-flex; min-height: 42px; align-items: center; border: 1px solid var(--line); padding: 0 14px; text-decoration: none; white-space: nowrap; }
      .boards { display: grid; gap: 28px; margin-top: 30px; }
      article { border: 1px solid var(--line); background: rgba(255,255,255,.045); }
      .head { display: flex; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--line); padding: 14px 16px; color: var(--muted); }
      .head strong { color: var(--text); }
      img { display: block; width: 100%; height: auto; background: #111; }
      @media (max-width: 720px) { header { display: block; } .back { margin-top: 18px; } main { width: min(100% - 20px, 1440px); } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI 辅助记忆增强设计</h1>
          <p>完整项目素材页，包含主视觉板、过程板与细节板。</p>
        </div>
        <a class="back" href="../../../index.html#top">返回作品集</a>
      </header>
      <section class="boards">
        <article>
          <div class="head"><strong>主视觉板</strong><span>01</span></div>
          <img src="./Frame 2147223887.svg" alt="AI Assisted Memory primary board" />
        </article>
        <article>
          <div class="head"><strong>过程板</strong><span>02</span></div>
          <img src="./Frame 2147223885.svg" alt="AI Assisted Memory process board" />
        </article>
        <article>
          <div class="head"><strong>细节板</strong><span>03</span></div>
          <img src="./Frame 2147223884.svg" alt="AI Assisted Memory detail board" />
        </article>
      </section>
    </main>
  </body>
</html>
