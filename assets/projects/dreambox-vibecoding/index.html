<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书 AI Builder Studio 前端结合硬件项目</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: rgba(255, 255, 255, 0.055);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f5f2e9;
        --muted: rgba(245, 242, 233, 0.68);
        --accent: #dfff67;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(223, 255, 103, 0.14), transparent 24rem),
          linear-gradient(135deg, #070709, #121018 54%, #0a0d0e);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1480px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 48px;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        min-height: 180px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 24px;
      }

      .eyebrow {
        display: inline-flex;
        border: 1px solid var(--line);
        padding: 6px 9px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 900px;
        margin: 18px 0 0;
        font-size: clamp(40px, 6vw, 98px);
        font-weight: 650;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .summary {
        max-width: 560px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border: 1px solid var(--line);
        padding: 0 14px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 13px;
        text-decoration: none;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #111;
      }

      .jump-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        margin-top: 28px;
        border: 1px solid var(--accent);
        padding: 18px;
        background: rgba(223, 255, 103, 0.08);
      }

      .jump-panel strong {
        display: block;
        font-size: 18px;
        font-weight: 620;
      }

      .jump-panel span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .boards {
        display: grid;
        gap: 22px;
        margin-top: 28px;
      }

      .board {
        overflow: visible;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .board-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
        color: var(--muted);
        font-size: 13px;
      }

      .board-head strong {
        color: var(--text);
        font-weight: 560;
      }

      .board-viewport {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 3 / 2;
        min-height: 0;
        overflow: visible;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 32px 32px,
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 32px 32px,
          #111;
      }

      .board img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        background: #111;
        transform: scale(var(--board-scale, 1));
        transform-origin: center;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 1480px);
          padding-top: 20px;
        }

        header {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .actions {
          justify-content: flex-start;
        }

        .jump-panel {
          grid-template-columns: 1fr;
        }

        .board-viewport {
          aspect-ratio: 4 / 3;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <span class="eyebrow">AI Builder Studio / Hardware / Frontend</span>
          <h1>小红书 AI Builder Studio 前端结合硬件项目</h1>
          <p class="summary">
            围绕 AI Builder Studio 前端体验、硬件交互和 AIGC 内容生成展开的项目资料页。
          </p>
        </div>
        <nav class="actions" aria-label="project links">
          <a class="button primary" href="https://dreambox-demo.onrender.com/studio#product-video" target="_blank" rel="noreferrer">跳转到网页</a>
        </nav>
      </header>

      <section class="jump-panel" aria-label="jump to web project">
        <div>
          <strong>查看可交互网页</strong>
          <span>打开完整的 AI Builder Studio 前端体验与产品视频页面。</span>
        </div>
        <a class="button primary" href="https://dreambox-demo.onrender.com/studio#product-video" target="_blank" rel="noreferrer">跳转到网页</a>
      </section>

      <section class="boards" aria-label="Dreambox boards">
        <article class="board">
          <div class="board-head">
            <strong>功能架构</strong>
            <span>Frame 396</span>
          </div>
          <div class="board-viewport" style="--board-scale: 1.36">
            <img src="./dreambox-experience-board.svg" alt="功能架构展示板" />
          </div>
        </article>
        <article class="board">
          <div class="board-head">
            <strong>硬件部分</strong>
            <span>Frame 400</span>
          </div>
          <div class="board-viewport" style="--board-scale: 1">
            <a class="button primary" href="https://dreambox-demo.onrender.com/studio#product-video" target="_blank" rel="noreferrer">跳转到网页</a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
